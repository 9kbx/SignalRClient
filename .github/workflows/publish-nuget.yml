name: Publish SignalRClient To NuGet

on:
  release:
    types:
      - published

jobs:
  publish:
    if: github.event.release.prerelease == false
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore SignalRClient/SignalRClient.csproj

      - name: Build
        run: dotnet build SignalRClient/SignalRClient.csproj --configuration Release --no-restore

      - name: Pack SignalRClient
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          dotnet pack SignalRClient/SignalRClient.csproj \
            --configuration Release \
            --no-build \
            -p:PackageVersion="$VERSION" \
            --output ./artifacts

      - name: Push to NuGet
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Push symbols to NuGet
        run: |
          dotnet nuget push "./artifacts/*.snupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
